<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codex Dashboard</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Dark Mode Based on System Preference -->
  <script>
    if (
      localStorage.theme === "dark" ||
      (!("theme" in localStorage) &&
        window.matchMedia("(prefers-color-scheme: dark)").matches)
    ) {
      document.documentElement.classList.add("dark");
    } else {
      document.documentElement.classList.remove("dark");
    }
  </script>

  <style>
    body {
      background-color: #f9fafb;
    }
    .dark body {
      background-color: #0f172a;
    }
  </style>
</head>

<body class="text-gray-900 dark:text-gray-100 transition">

  <div class="max-w-5xl mx-auto p-6">
    <!-- Header -->
    <header class="mb-10">
      <h1 class="text-3xl font-bold mb-2">Codex Dashboard</h1>
      <p class="text-gray-600 dark:text-gray-300">
        Automated project insights powered by GitHub Actions.
      </p>
    </header>

    <!-- Status Card -->
    <section id="statusCard" class="mb-10 p-6 rounded-xl shadow bg-white dark:bg-slate-800">
      <h2 class="text-xl font-semibold mb-4">Codex Status</h2>
      <div id="codexStatus" class="text-lg"></div>
    </section>

    <!-- Commits -->
    <section class="mb-10">
      <h2 class="text-xl font-semibold mb-4">Recent Commits</h2>
      <div id="commitsList" class="space-y-4"></div>
    </section>

    <!-- Pull Requests -->
    <section class="mb-10">
      <h2 class="text-xl font-semibold mb-4">Recent Pull Requests</h2>
      <div id="prsList" class="space-y-4"></div>
    </section>

    <!-- Workflow Runs -->
    <section class="mb-10">
      <h2 class="text-xl font-semibold mb-4">Recent Workflow Runs</h2>
      <div id="workflowList" class="space-y-4"></div>
    </section>

    <!-- Footer -->
    <footer class="mt-12 text-center text-gray-500 dark:text-gray-400">
      Codex Dashboard — auto-generated by GitHub Actions.
    </footer>
  </div>

  <script>
    const base = "https://garybayes.github.io/saas-app/data";

    const endpoints = {
      status: `${base}/codex.json`,
      commits: `${base}/commits.json`,
      prs: `${base}/prs.json`,
      workflows: `${base}/workflows.json`,
    };

    async function loadJSON(url) {
      try {
        const response = await fetch(url + "?cache=" + Date.now());
        return response.json();
      } catch (err) {
        console.error("Failed to load:", url, err);
        return null;
      }
    }

    function renderStatus(data) {
      const el = document.getElementById("codexStatus");
      if (!data || data.length === 0) {
        el.innerHTML = `<span class="text-yellow-500">No status data</span>`;
        return;
      }
      const s = data[0];
      el.innerHTML = `
        <span class="font-bold">Status:</span>
        <span class="px-3 py-1 rounded-full ${
          s.color === "red"
            ? "bg-red-500 text-white"
            : s.color === "green"
            ? "bg-green-500 text-white"
            : "bg-gray-300 text-black"
        }">${s.message}</span>
      `;
    }

    function renderCommits(list) {
      const wrap = document.getElementById("commitsList");
      wrap.innerHTML = "";
      if (!list || list.length === 0) {
        wrap.innerHTML = `<p>No commit data found.</p>`;
        return;
      }

      list.slice(0, 10).forEach((c) => {
        const card = document.createElement("div");
        card.className =
          "p-4 rounded-lg bg-white dark:bg-slate-700 shadow border dark:border-slate-600";
        card.innerHTML = `
          <div class="font-semibold">${c.message || "No message"}</div>
          <div class="text-sm text-gray-600 dark:text-gray-400">
            ${c.status || ""}
          </div>
        `;
        wrap.appendChild(card);
      });
    }

    function renderPRs(list) {
      const wrap = document.getElementById("prsList");
      wrap.innerHTML = "";
      if (!list || list.length === 0) {
        wrap.innerHTML = `<p>No PR data found.</p>`;
        return;
      }

      list.slice(0, 10).forEach((pr) => {
        const card = document.createElement("div");
        card.className =
          "p-4 rounded-lg bg-white dark:bg-slate-700 shadow border dark:border-slate-600";
        card.innerHTML = `
          <div class="font-semibold">${pr.message || "PR"}</div>
          <div class="text-sm text-gray-600 dark:text-gray-400">
            ${pr.status || ""} — 
            <a href="${pr.documentation_url || "#"}" class="text-blue-500 underline">Docs</a>
          </div>
        `;
        wrap.appendChild(card);
      });
    }

    function renderWorkflows(list) {
      const wrap = document.getElementById("workflowList");
      wrap.innerHTML = "";
      if (!list || list.length === 0) {
        wrap.innerHTML = `<p>No workflow run data found.</p>`;
        return;
      }

      list.slice(0, 10).forEach((wf) => {
        const card = document.createElement("div");
        card.className =
          "p-4 rounded-lg bg-white dark:bg-slate-700 shadow border dark:border-slate-600";
        card.innerHTML = `
          <div class="font-semibold">${wf.name || "Workflow"}</div>
          <div class="text-sm text-gray-600 dark:text-gray-400">
            Status: ${wf.status || "unknown"}
          </div>
        `;
        wrap.appendChild(card);
      });
    }

    async function init() {
      const [status, commits, prs, workflows] = await Promise.all([
        loadJSON(endpoints.status),
        loadJSON(endpoints.commits),
        loadJSON(endpoints.prs),
        loadJSON(endpoints.workflows),
      ]);

      renderStatus(status);
      renderCommits(commits);
      renderPRs(prs);
      renderWorkflows(workflows);
    }

    init();
  </script>
</body>
</html>
